name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & publish release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Package
        run: tar -czf launchpulse-${{ github.ref_name }}.tar.gz dist package.json package-lock.json

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: launchpulse-${{ github.ref_name }}.tar.gz
          generate_release_notes: true
